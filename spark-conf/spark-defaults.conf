# ── Iceberg extension ──────────────────────────────────────────────────────────
spark.sql.extensions                                    org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.nessie                                org.apache.iceberg.spark.SparkCatalog

# ── Case sensitivity ───────────────────────────────────────────────────────────
spark.sql.caseSensitive                                 true

# ── Nessie catalog via Iceberg REST ───────────────────────────────────────────
spark.sql.catalog.nessie.type                           rest
spark.sql.catalog.nessie.uri                            ${ICEFLOW_NESSIE_URI}
spark.sql.catalog.nessie.warehouse                      ${ICEFLOW_NESSIE_WAREHOUSE}
spark.sql.catalog.nessie.prefix                         ${ICEFLOW_NESSIE_PREFIX}
spark.sql.catalog.nessie.nested-namespace-enabled       true
spark.sql.catalog.nessie.default-namespace              default

# ── OAuth2 ────────────────────────────────────────────────────────────────────
# Initial token is pre-fetched by entrypoint.sh to survive the unauthenticated
# /v1/config discovery call that Iceberg makes before fetching its own token.
# The credential + oauth2-server-uri properties enable Iceberg's built-in
# token refresh so sessions stay alive beyond the initial token's TTL.
spark.sql.catalog.nessie.security                       OAUTH2
spark.sql.catalog.nessie.token                          ${ICEFLOW_OAUTH2_TOKEN}
spark.sql.catalog.nessie.credential                     ${ICEFLOW_CLIENT_ID}:${ICEFLOW_CLIENT_SECRET}
spark.sql.catalog.nessie.oauth2-server-uri              ${ICEFLOW_OAUTH2_SERVER_URI}
spark.sql.catalog.nessie.scope                          ${ICEFLOW_NESSIE_SCOPE}
spark.sql.catalog.nessie.token-refresh-enabled          true
spark.sql.catalog.nessie.vended-credentials-enabled     true

# ── S3 — uses AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env vars natively ────
spark.hadoop.fs.s3a.endpoint                            ${ICEFLOW_S3_ENDPOINT}
spark.hadoop.fs.s3a.path.style.access                   false
spark.hadoop.fs.s3a.impl                                org.apache.hadoop.fs.s3a.S3AFileSystem

# ── Thrift Server ─────────────────────────────────────────────────────────────
spark.sql.hive.thriftServer.singleSession               false
# Keep the default catalog as spark_catalog (Hive) so Metabase only sees Hive
# tables/views and does not traverse the nessie catalog during schema sync.
spark.sql.defaultCatalog                                spark_catalog
