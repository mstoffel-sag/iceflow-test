services:
  starrocks:
    build: ./starrocks
    container_name: starrocks
    ports:
      - "9030:9030" # FE MySQL protocol (Metabase connects here)
      - "8030:8030" # FE HTTP
      - "8040:8040" # BE HTTP
    mem_limit: 6g
    env_file:
      - .env
    environment:
      - ICEFLOW_NESSIE_URI=${ICEFLOW_NESSIE_URI}
      - ICEFLOW_NESSIE_WAREHOUSE=${ICEFLOW_NESSIE_WAREHOUSE}
      - ICEFLOW_NESSIE_PREFIX=${ICEFLOW_NESSIE_PREFIX}
      - ICEFLOW_NESSIE_SCOPE=${ICEFLOW_NESSIE_SCOPE}
      - ICEFLOW_OAUTH2_SERVER_URI=${ICEFLOW_OAUTH2_SERVER_URI}
      - ICEFLOW_AWS_ACCESS_KEY=${ICEFLOW_AWS_ACCESS_KEY}
      - ICEFLOW_AWS_SECRET_KEY=${ICEFLOW_AWS_SECRET_KEY}
      - ICEFLOW_AWS_REGION=${ICEFLOW_AWS_REGION}
      - ICEFLOW_S3_ENDPOINT=${ICEFLOW_S3_ENDPOINT}
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/starrocks_ready"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx3g
      - MB_DB_TYPE=h2
      - MB_DB_FILE=/metabase-data/metabase.db
      - MB_QUERY_TIMEOUT_SECONDS=300
      - MB_JDBC_DATA_WAREHOUSE_MAX_CONNECTION_POOL_SIZE=5
    volumes:
      - metabase_data:/metabase-data
    mem_limit: 4g
    depends_on:
      starrocks:
        condition: service_healthy

volumes:
  metabase_data:
