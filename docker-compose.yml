services:
  spark:
    build: ./spark
    container_name: spark
    volumes:
      - ./spark-conf/spark-defaults.conf:/spark-conf/spark-defaults.conf:ro
      - spark_metastore:/opt/spark/work-dir
    ports:
      - "10000:10000" # HiveServer2 / Thrift (Metabase connects here)
      - "4040:4040" # Spark UI (optional)
    mem_limit: 4g
    env_file:
      - .env
    environment:
      - AWS_ACCESS_KEY_ID=${ICEFLOW_AWS_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${ICEFLOW_AWS_SECRET_KEY}
      - AWS_REGION=${ICEFLOW_AWS_REGION}
      - ICEFLOW_NESSIE_URI=${ICEFLOW_NESSIE_URI}
      - ICEFLOW_NESSIE_WAREHOUSE=${ICEFLOW_NESSIE_WAREHOUSE}
      - ICEFLOW_NESSIE_PREFIX=${ICEFLOW_NESSIE_PREFIX}
      - ICEFLOW_NESSIE_SCOPE=${ICEFLOW_NESSIE_SCOPE}
      - ICEFLOW_OAUTH2_SERVER_URI=${ICEFLOW_OAUTH2_SERVER_URI}
      - ICEFLOW_S3_ENDPOINT=${ICEFLOW_S3_ENDPOINT}
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/spark_ready"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 10s
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx3g
      - MB_DB_TYPE=h2
      - MB_DB_FILE=/metabase-data/metabase.db
      - MB_QUERY_TIMEOUT_SECONDS=300
      - MB_JDBC_DATA_WAREHOUSE_MAX_CONNECTION_POOL_SIZE=5
    volumes:
      - metabase_data:/metabase-data
    mem_limit: 4g
    depends_on:
      spark:
        condition: service_healthy

volumes:
  metabase_data:
  spark_metastore:
