# ── Connector ──────────────────────────────────────────────────────────────────
connector.name=iceberg

# ── Catalog type: Iceberg REST ─────────────────────────────────────────────────
iceberg.catalog.type=rest

# ── REST Catalog URI ────────────────────────────────────────────────────────────
# Nessie (>= 0.83) serves the Iceberg REST API at /iceberg/
# Replace with your actual Nessie host and port.
iceberg.rest-catalog.uri=${ENV:ICEFLOW_NESSIE_URI}

# ── Warehouse ──────────────────────────────────────────────────────────────────
# Root S3 location for Iceberg data and metadata.
# Replace with your actual bucket name and prefix.
iceberg.rest-catalog.warehouse=${ENV:ICEFLOW_NESSIE_WAREHOUSE}

# ── Branch (Nessie ref) ────────────────────────────────────────────────────────
iceberg.rest-catalog.prefix=${ENV:ICEFLOW_NESSIE_PREFIX}

# Enable multi-level namespace support (required for Nessie's nested namespace hierarchy).
# Nessie organises data as default → t2027824580 → cdc → measurement, so each
# dot-delimited level becomes a Trino schema segment.
iceberg.rest-catalog.nested-namespace-enabled=true

iceberg.rest-catalog.security=OAUTH2
iceberg.rest-catalog.oauth2.server-uri=${ENV:ICEFLOW_OAUTH2_SERVER_URI}
iceberg.rest-catalog.oauth2.credential=${ENV:ICEFLOW_CLIENT_ID}:${ENV:ICEFLOW_CLIENT_SECRET}
iceberg.rest-catalog.oauth2.scope=${ENV:ICEFLOW_NESSIE_SCOPE}
iceberg.rest-catalog.vended-credentials-enabled=true
# ── S3 File System ─────────────────────────────────────────────────────────────
fs.native-s3.enabled=true

# Static AWS credentials — replace with your actual keys.
s3.aws-access-key=${ENV:ICEFLOW_AWS_ACCESS_KEY}
s3.aws-secret-key=${ENV:ICEFLOW_AWS_SECRET_KEY}

s3.region=${ENV:ICEFLOW_AWS_REGION}
